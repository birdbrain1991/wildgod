<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILD GOD</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:   #000000;
  --deep:   #0a0000;
  --blood:  #6b0000;
  --ember:  #a00000;
  --flame:  #cc1111;
  --ash:    #2a0a0a;
  --bone:   #c8b89a;
  --dim:    rgba(200,184,154,0.5);
}

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--void);
  font-family: 'Cinzel', serif;
  cursor: crosshair;
}

/* ── CANVAS ── */
#c {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ── GRAIN OVERLAY ── */
#grain {
  position: fixed; inset: 0; z-index: 5;
  pointer-events: none;
  opacity: 0.045;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── VIGNETTE ── */
#vignette {
  position: fixed; inset: 0; z-index: 6; pointer-events: none;
  background: radial-gradient(ellipse at center,
    transparent 30%,
    rgba(0,0,0,0.5) 70%,
    rgba(0,0,0,0.92) 100%
  );
}

/* ── BACK LINK ── */
#back {
  position: fixed; top: 22px; left: 28px;
  z-index: 50;
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 4px;
  color: var(--bone);
  text-decoration: none;
  text-transform: uppercase;
  border: 1px solid rgba(200,184,154,0.35);
  padding: 8px 16px;
  background: rgba(0,0,0,0.6);
  transition: all 0.3s ease;
  opacity: 0;
  animation: fadeIn 2s ease 3s forwards;
}
#back:hover {
  color: #fff;
  border-color: var(--bone);
  background: rgba(107,0,0,0.3);
  box-shadow: 0 0 18px rgba(107,0,0,0.4);
}

/* ── BOTTOM TEXT ── */
#text-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 50;
  text-align: center;
  padding-bottom: 52px;
  pointer-events: none;
  opacity: 0;
  animation: fadeIn 2.5s ease 2.5s forwards;
}

/* decorative line above text */
#text-wrap::before {
  content: '';
  display: block;
  width: 180px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,184,154,0.4), transparent);
  margin: 0 auto 22px;
}

#line1 {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 400;
  font-size: clamp(13px, 2.2vw, 22px);
  letter-spacing: 8px;
  color: var(--bone);
  text-shadow:
    0 0 30px rgba(180,0,0,0.8),
    0 0 60px rgba(180,0,0,0.4),
    0 0 2px rgba(255,255,255,0.3);
  text-transform: uppercase;
  animation: textPulse 4s ease-in-out infinite;
}

#line2 {
  margin-top: 12px;
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: clamp(10px, 1.4vw, 14px);
  letter-spacing: 12px;
  color: var(--ember);
  text-shadow: 0 0 20px rgba(160,0,0,0.9);
  text-transform: uppercase;
  opacity: 0.85;
}

/* ornament between lines */
#ornament {
  display: block;
  font-size: 11px;
  letter-spacing: 6px;
  color: rgba(200,184,154,0.25);
  margin: 8px 0;
}

@keyframes textPulse {
  0%,100% { text-shadow: 0 0 30px rgba(180,0,0,0.8), 0 0 60px rgba(180,0,0,0.4), 0 0 2px rgba(255,255,255,0.3); }
  50%      { text-shadow: 0 0 45px rgba(200,0,0,1.0), 0 0 90px rgba(200,0,0,0.6), 0 0 4px rgba(255,255,255,0.5); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; z-index: 200;
  background: #000;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
  transition: opacity 1.2s ease;
}
#loading.out { opacity: 0; pointer-events: none; }
#load-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(20px, 4vw, 42px);
  letter-spacing: 10px;
  color: var(--ember);
  text-shadow: 0 0 40px rgba(160,0,0,0.7);
  animation: loadPulse 1.5s ease-in-out infinite;
}
#load-bar {
  width: 160px; height: 1px;
  background: rgba(107,0,0,0.3);
  position: relative; overflow: hidden;
}
#load-bar::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(to right, transparent, var(--ember), transparent);
  animation: loadSweep 1.8s ease-in-out infinite;
}
@keyframes loadPulse { 0%,100%{opacity:.6} 50%{opacity:1} }
@keyframes loadSweep { to { left: 100%; } }
</style>
</head>
<body>

<div id="loading">
  <div id="load-bar"></div>
</div>

<canvas id="c"></canvas>
<div id="grain"></div>
<div id="vignette"></div>

<a href="https://birdbrain1991.github.io/corpsemouth/" id="back">← CORPSE MOUTH</a>

<div id="text-wrap">
  <div id="line1">Cherrish the Old Gods</div>
  <span id="ornament">— ✦ —</span>
  <div id="line2">Midsommar 2026</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
renderer.shadowMap.enabled = true;

// ── SCENE ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0000, 0.035);

// ── CAMERA ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 5);
camera.lookAt(0, 0, 0);

// ── LIGHTS ──
// Deep ambient — almost nothing
const ambient = new THREE.AmbientLight(0x110000, 0.6);
scene.add(ambient);

// Blood red from below — hellish uplight
const hellLight = new THREE.PointLight(0x8b0000, 4, 12);
hellLight.position.set(0, -2.5, 1);
scene.add(hellLight);

// Ember from above — barely visible
const topLight = new THREE.PointLight(0x660000, 2, 10);
topLight.position.set(0, 4, 2);
scene.add(topLight);

// Rim light from behind — dark red silhouette
const rimLight = new THREE.PointLight(0xcc2200, 1.5, 15);
rimLight.position.set(0, 1, -4);
scene.add(rimLight);

// Moving orbit light — circles the model slowly
const orbitLight = new THREE.PointLight(0xff1a00, 3, 8);
scene.add(orbitLight);

// ── FLOOR (dark reflective) ──
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0000,
  roughness: 0.6,
  metalness: 0.4,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2.2;
scene.add(floor);

// ── PARTICLES (embers/ritual dust) ──
const partCount = 180;
const partGeo = new THREE.BufferGeometry();
const partPos = new Float32Array(partCount * 3);
const partSpeeds = new Float32Array(partCount);
for (let i = 0; i < partCount; i++) {
  partPos[i*3]   = (Math.random() - 0.5) * 10;
  partPos[i*3+1] = (Math.random() - 0.5) * 8;
  partPos[i*3+2] = (Math.random() - 0.5) * 10;
  partSpeeds[i]  = 0.002 + Math.random() * 0.004;
}
partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
const partMat = new THREE.PointsMaterial({
  color: 0xcc2200, size: 0.04,
  transparent: true, opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

// ── GLB MODEL LOADER ──
let modelGroup = null;

// Minimal GLB loader using fetch + manual parsing approach
// Use THREE GLTFLoader via CDN
const loaderScript = document.createElement('script');
loaderScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';

// Load GLTFLoader
function loadGLTFLoader(cb) {
  const s = document.createElement('script');
  s.onload = cb;
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  document.head.appendChild(s);
}

loadGLTFLoader(() => {
  const loader = new THREE.GLTFLoader();
  loader.load(
    'https://birdbrain1991.github.io/wildgod/god.glb',
    (gltf) => {
      modelGroup = gltf.scene;

      // Center and scale model
      const box = new THREE.Box3().setFromObject(modelGroup);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 3.5 / maxDim;
      modelGroup.scale.setScalar(scale);
      modelGroup.position.sub(center.multiplyScalar(scale));
      modelGroup.position.y += 0.2;

      // Apply dark red material tint to all meshes
      modelGroup.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          // Keep original material but tint metalness/roughness for hellish look
          if (child.material) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(mat => {
              mat.envMapIntensity = 0.3;
            });
          }
        }
      });

      scene.add(modelGroup);
      document.getElementById('loading').classList.add('out');
    },
    (progress) => {
      // loading progress — could update bar here
    },
    (error) => {
      console.error('GLB load error:', error);
      // Fallback: show placeholder if model fails
      const fallbackGeo = new THREE.OctahedronGeometry(1.5, 2);
      const fallbackMat = new THREE.MeshStandardMaterial({
        color: 0x3a0000, roughness: 0.3, metalness: 0.8,
        emissive: 0x1a0000, emissiveIntensity: 0.5,
      });
      modelGroup = new THREE.Mesh(fallbackGeo, fallbackMat);
      scene.add(modelGroup);
      document.getElementById('loading').classList.add('out');
    }
  );
});

// ── CLOCK & RENDER ──
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const t = clock.getElapsedTime();

  // Elegant elliptical path — asymmetric so camera swings close and far
  const angle = t * 0.15;
  const rx = 5.5;  // wide axis
  const rz = 4.2;  // narrow axis — less asymmetric, no more weird close passes

  camera.position.x = Math.sin(angle) * rx;
  camera.position.z = Math.cos(angle) * rz;

  // Height variation reduced — more horizontal, less crane
  camera.position.y = 0.8
    + Math.sin(t * 0.17) * 0.9
    + Math.sin(t * 0.08) * 0.3;

  // Look target drifts slightly — camera attention wanders across the model
  const lookY = 0.1 + Math.sin(t * 0.11) * 0.4;
  camera.lookAt(0, lookY, 0);

  // Orbit light moves opposite — shifting shadows
  orbitLight.position.x = Math.sin(angle + Math.PI * 0.7) * 4;
  orbitLight.position.z = Math.cos(angle + Math.PI * 0.7) * 4;
  orbitLight.position.y = 1 + Math.sin(t * 0.5) * 0.8;
  orbitLight.intensity = 2.5 + Math.sin(t * 1.2) * 0.8;

  // Hell light flicker
  hellLight.intensity = 3.5 + Math.sin(t * 2.3) * 0.8 + Math.sin(t * 5.1) * 0.3;

  // Particle drift upward
  const pp = partGeo.attributes.position.array;
  for (let i = 0; i < partCount; i++) {
    pp[i*3+1] += partSpeeds[i];
    if (pp[i*3+1] > 5) pp[i*3+1] = -4;
    pp[i*3]   += Math.sin(t * 0.3 + i) * 0.001;
  }
  partGeo.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}
animate();

// ── RESIZE ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
